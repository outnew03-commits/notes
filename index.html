<!DOCTYPE html>
<html>
<head>
<title>My Notes</title>

<style>

body{
background:#202124;
color:white;
font-family:Arial;
margin:0;
}

.header{
background:#303134;
padding:15px;
text-align:center;
font-size:22px;
}

.notes{
display:grid;
grid-template-columns:repeat(auto-fill,250px);
gap:20px;
padding:20px;
}

.note{
background:#2b2b2b;
padding:15px;
border-radius:15px;
min-height:120px;
}

.fab{
position:fixed;
bottom:25px;
right:25px;
background:#8ab4f8;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
cursor:pointer;
color:black;
}

input{
padding:10px;
width:200px;
}

</style>

<script>

function addNote(){

let text = prompt("Write your note");

if(text){

let note = document.createElement("div");
note.className="note";
note.innerText=text;

document.getElementById("notes").appendChild(note);

}

}

function checkCode(){

let code = prompt("Enter secret code");

if(code=="7777"){
window.location="chat html";
}

}

</script>

</head>

<body>

<div class="header" onclick="checkCode()">Keep</div>

<div class="notes" id="notes">

<div class="note">My first note</div>

</div>

<div class="fab" onclick="addNote()">+</div>

</body>
</html>
