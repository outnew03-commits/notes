<!DOCTYPE html>
<html>
<head>
<title>Secret Chat</title>

<style>

body{
background:#202124;
color:white;
font-family:Arial;
margin:0;
}

.header{
background:#303134;
padding:15px;
text-align:center;
font-size:20px;
}

.chatbox{
padding:20px;
}

input{
padding:10px;
width:70%;
}

button{
padding:10px;
}

.message{
background:#2b2b2b;
padding:10px;
margin:10px 0;
border-radius:10px;
}

</style>

<script>

function sendMessage(){

let text = document.getElementById("msg").value;

if(text!=""){

let msg = document.createElement("div");
msg.className="message";
msg.innerText=text;

document.getElementById("chat").appendChild(msg);

document.getElementById("msg").value="";

}

}

</script>

</head>

<body>

<div class="header">Secret Chat</div>

<div class="chatbox">

<div id="chat"></div>

<input id="msg" placeholder="Type message">
<button onclick="sendMessage()">Send</button>

</div>

</body>
</html>
