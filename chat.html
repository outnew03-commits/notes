<!DOCTYPE html>
<html>
<head>
<title>Secret Chat</title>

<style>

body{
font-family:Arial;
background:#202124;
color:white;
margin:0;
}

.header{
background:#303134;
padding:15px;
font-size:20px;
}

.chatbox{
padding:20px;
}

.message{
background:#303134;
padding:10px;
margin:10px 0;
border-radius:10px;
}

input{
padding:10px;
width:70%;
}

button{
padding:10px;
cursor:pointer;
}

</style>

<script>

function sendMessage(){

let text=document.getElementById("msg").value;

if(text!=""){

let div=document.createElement("div");
div.className="message";
div.innerText=text;

document.getElementById("chat").appendChild(div);

document.getElementById("msg").value="";

}

}

</script>

</head>

<body>

<div class="header">Secret Chat</div>

<div class="chatbox">

<div id="chat"></div>

<input id="msg" placeholder="Type message">
<button onclick="sendMessage()">Send</button>

</div>

</body>
</html>
